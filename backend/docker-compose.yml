services:
  postgres:
    image: postgres:16-alpine
    container_name: infinite-loop-gadgets-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: infinite_loop_gadgets
      POSTGRES_USER: infinite_loop
      POSTGRES_PASSWORD: infinite_loop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
